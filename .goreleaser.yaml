version: 2

project_name: changes

before:
  hooks:
    - sh -c 'version="${GORELEASER_CURRENT_TAG:-changes}"; version="${version#v}"; path=".local/share/changes/releases/changes-${version}+github_release.md"; if [ ! -f "${path}" ]; then mkdir -p "$(dirname "${path}")"; printf "# %s\n\nRelease notes were not generated yet.\n" "${GORELEASER_CURRENT_TAG:-changes}" > "${path}"; fi'

builds:
  - id: changes-darwin
    main: ./cmd/changes
    binary: changes
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - id: changes-linux
    main: ./cmd/changes
    binary: changes
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: changes-windows
    main: ./cmd/changes
    binary: changes
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: changes-darwin
    ids:
      - changes-darwin
    formats:
      - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
  - id: changes-linux
    ids:
      - changes-linux
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
  - id: changes-windows
    ids:
      - changes-windows
    formats:
      - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: checksums.txt

release:
  github:
    owner: "{{ .Env.CHANGES_GITHUB_OWNER }}"
    name: "{{ .Env.CHANGES_GITHUB_REPO }}"

homebrew_casks:
  - name: changes
    ids:
      - changes-darwin
      - changes-linux
    binaries:
      - changes
    directory: Casks
    homepage: "{{ .Env.CHANGES_PROJECT_HOMEPAGE }}"
    description: "Fragment-driven changelog and release-note manager."
    caveats: |
      This cask is generated by GoReleaser from public GitHub release assets.
      If the release artifacts are signed and notarized, remove the quarantine hook.
    url:
      template: "https://github.com/{{ .Env.CHANGES_GITHUB_OWNER }}/{{ .Env.CHANGES_GITHUB_REPO }}/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    repository:
      owner: "{{ .Env.CHANGES_HOMEBREW_TAP_OWNER }}"
      name: "{{ .Env.CHANGES_HOMEBREW_TAP_REPO }}"
      branch: "{{ .Env.CHANGES_HOMEBREW_TAP_BRANCH }}"
      token: "{{ .Env.CHANGES_HOMEBREW_TAP_TOKEN }}"
    commit_msg_template: "chore: publish {{ .ProjectName }} {{ .Version }}"
    commit_author:
      name: "{{ .Env.CHANGES_RELEASE_BOT_NAME }}"
      email: "{{ .Env.CHANGES_RELEASE_BOT_EMAIL }}"
