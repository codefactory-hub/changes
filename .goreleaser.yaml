version: 2

project_name: changes

before:
  hooks:
    - sh -c 'version="${GORELEASER_CURRENT_TAG:-changes}"; version="${version#v}"; path=".local/share/changes/releases/changes-${version}+github_release.md"; if [ ! -f "${path}" ]; then mkdir -p "$(dirname "${path}")"; printf "# %s\n\nRelease notes were not generated yet.\n" "${GORELEASER_CURRENT_TAG:-changes}" > "${path}"; fi'

builds:
  - id: changes
    main: ./cmd/changes
    binary: changes
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: changes
    formats:
      - tar.gz
      - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: "{{ .Env.CHANGES_GITHUB_OWNER }}"
    name: "{{ .Env.CHANGES_GITHUB_REPO }}"

changelog:
  disable: true

homebrew_casks:
  - name: changes
    ids:
      - changes
    binaries:
      - changes
    directory: Casks
    homepage: "{{ .Env.CHANGES_PROJECT_HOMEPAGE }}"
    description: "Fragment-driven changelog and release-note manager."
    caveats: |
      This cask is generated by GoReleaser and targets a private/internal tap.
      If the release artifacts are signed and notarized, remove the quarantine hook.
    custom_block: |
      module ChangesTapHelper
        def self.token
          require "utils/github"

          github_token = ENV["HOMEBREW_GITHUB_API_TOKEN"]
          github_token ||= GitHub::API.credentials
          raise "missing HOMEBREW_GITHUB_API_TOKEN" if github_token.nil? || github_token.empty?

          github_token
        end

        def self.release_asset_url(tag, name)
          require "json"
          require "net/http"
          require "uri"

          uri = URI.parse("https://api.github.com/repos/{{ .Env.CHANGES_GITHUB_OWNER }}/{{ .Env.CHANGES_GITHUB_REPO }}/releases/tags/#{tag}")
          request = Net::HTTP::Get.new(uri)
          request["Accept"] = "application/vnd.github+json"
          request["Authorization"] = "Bearer #{token}"
          request["X-GitHub-Api-Version"] = "2022-11-28"

          response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
            http.request(request)
          end

          release = JSON.parse(response.body)
          asset = release.fetch("assets").find { |candidate| candidate["name"] == name }
          raise "missing asset #{name}" if asset.nil?

          asset.fetch("url")
        end
      end
    url:
      template: '#{ChangesTapHelper.release_asset_url("{{ .Tag }}", "{{ .ArtifactName }}")}'
      headers:
        - "Accept: application/octet-stream"
        - "Authorization: Bearer #{ChangesTapHelper.token}"
        - "X-GitHub-Api-Version: 2022-11-28"
    repository:
      owner: "{{ .Env.CHANGES_HOMEBREW_TAP_OWNER }}"
      name: "{{ .Env.CHANGES_HOMEBREW_TAP_REPO }}"
      branch: "{{ .Env.CHANGES_HOMEBREW_TAP_BRANCH }}"
      token: "{{ .Env.CHANGES_HOMEBREW_TAP_TOKEN }}"
    commit_msg_template: "chore: publish {{ .ProjectName }} {{ .Version }}"
    commit_author:
      name: "{{ .Env.CHANGES_RELEASE_BOT_NAME }}"
      email: "{{ .Env.CHANGES_RELEASE_BOT_EMAIL }}"
